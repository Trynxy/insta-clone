<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital@0;1&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        <title>Oldagram - Scrimba Project</title>
    </head>
    <body>
        <nav>
         <img class="logo" alt="oldagram logo" src="images/logo.png">
         <img class="profile-pic" src="/images/user-avatar.png">
        </nav>
        <main>
           
            
        <article class="olda-post">
            
            <header class="user-info">
                <div class="user-avatar"></div>
                <div class="name-location">
                 <h2 class="id-name"></h2>
                 <p class="location"></p>
                </div>
            </header>
            
            <figure class="feed-post">
            </figure>
            <div class="interactive-icons">
            <button class="btn"><i class="fa-solid fa-heart fa-2x"></i></button>
            <button class="btn"><i class="fa-solid fa-comment fa-2x"></i></button>
            <button class="btn"><i class="fa-solid fa-paper-plane fa-2x"></i></button>
            </div>
            
            <footer>
            <p class="likes-count"></p>
            <p class="username-caption"><span class="username"></span><span class="caption"></span></p>
            </footer>
            
        </article>
        
        
        <div class="separator"></div> 
        <div class="feed"></div> 
        </main>
     
    </body>
       <script src="index.js"></script>
</html>
